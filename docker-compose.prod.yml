version: "3.8"

services:
  # ── PostgreSQL ──
  db:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./database/01_rls_policies.sql:/docker-entrypoint-initdb.d/01_rls_policies.sql:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER}"]
      interval: 10s
      timeout: 5s
      retries: 5
    deploy:
      resources:
        limits:
          memory: 512M

  # ── Redis ──
  redis:
    image: redis:7-alpine
    restart: unless-stopped
    command: redis-server --maxmemory 128mb --maxmemory-policy allkeys-lru --requirepass ${REDIS_PASSWORD}
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "-a", "${REDIS_PASSWORD}", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    deploy:
      resources:
        limits:
          memory: 192M

  # ── Backend (FastAPI) ──
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
      target: production
    restart: unless-stopped
    environment:
      # IMPORTANTE: usar saas_app (respeta RLS), NO postgres (superuser bypasses RLS)
      DATABASE_URL: postgresql+asyncpg://${SAAS_APP_USER:-saas_app}:${SAAS_APP_PASSWORD}@db:5432/${POSTGRES_DB}
      ENVIRONMENT: production
      REDIS_URL: redis://:${REDIS_PASSWORD}@redis:6379
      SECRET_KEY: ${SECRET_KEY}
      DEBUG: "false"
      CORS_ORIGINS: ${CORS_ORIGINS:-http://localhost}
      FRONTEND_URL: ${FRONTEND_URL:-http://localhost}
      # MercadoPago
      MP_ACCESS_TOKEN: ${MP_ACCESS_TOKEN:-}
      MP_PUBLIC_KEY: ${MP_PUBLIC_KEY:-}
      # Monitoring
      SENTRY_DSN: ${SENTRY_DSN:-}
      # Email (Resend)
      RESEND_API_KEY: ${RESEND_API_KEY:-}
      EMAIL_FROM: ${EMAIL_FROM:-Alfredo <no-reply@alfredo.app>}
      # Integrations (optional)
      CLOUDINARY_URL: ${CLOUDINARY_URL:-}
      OPENAI_API_KEY: ${OPENAI_API_KEY:-}
      MERCADOLIBRE_CLIENT_ID: ${MERCADOLIBRE_CLIENT_ID:-}
      MERCADOLIBRE_CLIENT_SECRET: ${MERCADOLIBRE_CLIENT_SECRET:-}

    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "python", "-c", "import httpx; httpx.get('http://localhost:8000/health').raise_for_status()"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 15s
    deploy:
      resources:
        limits:
          memory: 512M

  # ── Frontend (Nginx + React) ──
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      args:
        VITE_API_URL: /api/v1
    restart: unless-stopped
    ports:
      - "${PORT:-80}:80"
    depends_on:
      backend:
        condition: service_healthy
    deploy:
      resources:
        limits:
          memory: 128M

  # ── Database Backups (scheduled via crond) ──
  backup:
    image: postgres:16-alpine
    restart: unless-stopped
    volumes:
      - ./scripts/backup-db.sh:/usr/local/bin/backup-db.sh:ro
      - ./scripts/check-backup-health.sh:/usr/local/bin/check-backup-health.sh:ro
      - backup_data:/backups
    environment:
      PGHOST: db
      PGUSER: ${POSTGRES_USER}
      PGPASSWORD: ${POSTGRES_PASSWORD}
      PGDATABASE: ${POSTGRES_DB}
      BACKUP_DIR: /backups
      BACKUP_RETAIN_DAYS: ${BACKUP_RETAIN_DAYS:-7}
      S3_BUCKET: ${BACKUP_S3_BUCKET:-}
      AWS_ACCESS_KEY_ID: ${AWS_ACCESS_KEY_ID:-}
      AWS_SECRET_ACCESS_KEY: ${AWS_SECRET_ACCESS_KEY:-}
      ALERT_WEBHOOK_URL: ${ALERT_WEBHOOK_URL:-}
    depends_on:
      db:
        condition: service_healthy
    # Use crond for precise scheduling instead of sleep loops
    entrypoint: ["/bin/sh", "-c"]
    command:
      - |
        chmod +x /usr/local/bin/backup-db.sh /usr/local/bin/check-backup-health.sh

        # Schedule: backup at 03:00 and 15:00 daily (twice a day)
        echo "0  3 * * * /usr/local/bin/backup-db.sh >> /var/log/backup.log 2>&1" > /etc/crontabs/root
        echo "0 15 * * * /usr/local/bin/backup-db.sh >> /var/log/backup.log 2>&1" >> /etc/crontabs/root
        # Health check every 6 hours
        echo "0 */6 * * * /usr/local/bin/check-backup-health.sh >> /var/log/backup.log 2>&1" >> /etc/crontabs/root

        # Run initial backup on startup
        echo "Running initial backup..."
        /usr/local/bin/backup-db.sh

        # Start cron daemon in foreground
        echo "Starting cron scheduler (backups at 03:00, 15:00 daily)..."
        crond -f -l 2
    healthcheck:
      test: ["CMD-SHELL", "/usr/local/bin/check-backup-health.sh"]
      interval: 6h
      timeout: 30s
      retries: 1
      start_period: 60s
    deploy:
      resources:
        limits:
          memory: 256M

volumes:
  postgres_data:
  redis_data:
  backup_data:
